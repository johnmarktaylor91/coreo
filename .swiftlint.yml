excluded:
  - .git
  - .project-context
  - Coreo.xcodeproj
  - DerivedData

disabled_rules:
  - cyclomatic_complexity
  - file_length
  - for_where
  - function_body_length
  - function_parameter_count
  - identifier_name
  - inclusive_language
  - large_tuple
  - line_length
  - multiple_closures_with_trailing_closure
  - nesting
  - non_optional_string_data_conversion
  - shorthand_operator
  - static_over_final_class
  - trailing_comma
  - type_body_length

opt_in_rules:
  - force_unwrapping

force_try:
  severity: warning

force_unwrapping:
  severity: warning

reporter: xcode
